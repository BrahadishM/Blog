<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script>
  (function(){
    var saved = localStorage.getItem('theme');
    document.documentElement.setAttribute('data-theme', saved === 'light' ? 'light' : 'dark');
  })();
</script>
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
{% feed_meta %}
</head>
<body>

<nav class="site-nav">
  <div class="wrap">
    <a class="brand" href="{{ '/' | relative_url }}">{{ site.author }}</a>
    <ul class="nav-pins">
      <li><a class="nav-pin" href="{{ '/' | relative_url }}#profile">PROFILE</a></li>
      <li><a class="nav-pin" href="{{ '/' | relative_url }}#experience">EXPERIENCE</a></li>
      <li><a class="nav-pin" href="{{ '/' | relative_url }}#projects">PROJECTS</a></li>
      <li><a class="nav-pin" href="{{ '/' | relative_url }}#skills">SKILLS</a></li>
      <li><a class="nav-pin" href="{{ '/blog.html' | relative_url }}">LOG</a></li>
      <li><a class="nav-pin" href="{{ '/' | relative_url }}#contact">CONTACT</a></li>
    </ul>
    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light and dark theme">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z"></path></svg>
    </button>
  </div>
</nav>

<main class="wrap" style="padding-top: 40px; padding-bottom: 20px;">
  {{ content }}
</main>

<footer class="site-footer">
  <div class="wrap" style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; width:100%;">
    <span>&copy; {{ 'now' | date: "%Y" }} {{ site.author }}</span>
    <span>
      <a href="mailto:{{ site.email }}">{{ site.email }}</a> ·
      <a href="{{ site.linkedin_url }}" target="_blank" rel="noopener">linkedin</a> ·
      <a href="{{ site.github_url }}" target="_blank" rel="noopener">github</a>
    </span>
  </div>
</footer>

<script>
  (function(){
    var btn = document.getElementById('theme-toggle');
    if(!btn) return;
    btn.addEventListener('click', function(){
      var next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });
  })();
</script>
</body>
</html>
