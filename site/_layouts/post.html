---
layout: default
---
<a class="back-link" href="{{ '/blog.html' | relative_url }}">&larr; back to the log</a>

<article>
  <header class="post-header">
    <div class="section-tag"><span class="idx">LOG</span><span>ENTRY</span></div>
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      {{ page.date | date: "%d %b %Y" }}
      {% if page.tags %} · {% for tag in page.tags %}{{ tag }}{% unless forloop.last %}, {% endunless %}{% endfor %}{% endif %}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
